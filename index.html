  /* Leaderboard background particles

  function updateLbBg(delta) {
    const now = getNow();
    lbStars.forEach(s => {
      s.alpha = 0.3 + 0.4 * (0.5 + 0.5 * Math.sin(now * s.twinkleSpeed + s.twinkleOffset));
    });
    lbShooting.forEach((s, i) => {

      const t = s.life / s.maxLife;
      s.alpha = t < 0.15 ? t / 0.15 : t > 0.75 ? 1 - (t - 0.75) / 0.25 : 1;
      s.x += s.vx * delta * 0.06;
      s.y += s.vy * delta * 0.06;
      if (s.life >= s.maxLife) lbShooting[i] = _newShootingStar();
    });
    lbOrbs.forEach(o => { o.angle += o.speed * delta; });
  }

  function drawLbBg() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;

    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, W, H);

    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
    grad.addColorStop(0,   'rgba(0,79,255,0.07)');
    grad.addColorStop(0.5, 'rgba(49,175,212,0.03)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const G   = 64;
    const off = titleGridOff % G;
    ctx.save();
    ctx.lineWidth   = 0.6;
    ctx.globalAlpha = 0.09;
    setGlow(COLOR_CYAN, 4);
    ctx.strokeStyle = COLOR_CYAN;
    for (let x = -G + off; x < W + G; x += G) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = -G + off; y < H + G; y += G) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    clearGlow();
    ctx.restore();

    lbOrbs.forEach(o => {
      const ox = cx + Math.cos(o.angle) * o.radius * (W / 1200);
      const oy = cy + Math.sin(o.angle) * o.radius * 0.5 * (H / 800);
      const og = ctx.createRadialGradient(ox, oy, 0, ox, oy, o.size);
      og.addColorStop(0, o.color + 'cc');
      og.addColorStop(1, o.color + '00');
      ctx.save();
      ctx.globalAlpha = o.alpha;
      ctx.fillStyle = og;
      ctx.beginPath();
      ctx.arc(ox, oy, o.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    lbStars.forEach(s => {
      const sx = (s.x / 1920) * W;
      const sy = (s.y / 1080) * H;
      ctx.save();
      ctx.globalAlpha = s.alpha;
      setGlow(s.color, 6);
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
      ctx.fill();
      clearGlow();
      ctx.restore();
    });

    lbShooting.forEach(s => {
      if (s.alpha <= 0) return;
      const sx = (s.x / 1920) * W;
      const sy = (s.y / 1080) * H;
      const mag = Math.hypot(s.vx, s.vy);
      const nx  = s.vx / mag, ny = s.vy / mag;
      const tailScale = W / 1920;
      ctx.save();
      ctx.globalAlpha = s.alpha * 0.9;
      const sg = ctx.createLinearGradient(
        sx - nx * s.len * tailScale, sy - ny * s.len * tailScale,
        sx, sy
      );
      sg.addColorStop(0, s.color + '00');
      sg.addColorStop(1, s.color);
      setGlow(s.color, 14);
      ctx.strokeStyle = sg;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx - nx * s.len * tailScale, sy - ny * s.len * tailScale);
      ctx.lineTo(sx, sy);
      ctx.stroke();
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = '#ffffff';
      setGlow(s.color, 20);
      ctx.beginPath();
      ctx.arc(sx, sy, 2, 0, Math.PI * 2);
      ctx.fill();
      clearGlow();
      ctx.restore();
    });
  }

  // ─── LEADERBOARD ──────────────────────────────────────────────────────────────
  const leaderboard = {
    scores: [],
    loading: false,
    error: false,

    async fetchScores() {
      this.loading = true;
      this.error = false;
      this.loadTime = 0;
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?select=*&order=score.desc&limit=100`, {
          headers: { apikey: SUPABASE_ANON_KEY }
        });
        if (!res.ok) throw new Error();
        const rawScores = await res.json();

        const uniqueScores = [];
        const seenNames = new Set();
        for (const entry of rawScores) {
          if (!seenNames.has(entry.player_name)) {
            seenNames.add(entry.player_name);
            uniqueScores.push(entry);
          }
        }
        
        this.scores = uniqueScores.slice(0, 20);
        this.loadTime = getNow();
      } catch (e) {
        this.error = true;
      } finally {
        this.loading = false;
      }
    },

    async submitScore(score, kills) {
      if (score <= 0) return;
      const name = loadPlayerName();
      if (!name) return;
      try {
        const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?player_name=eq.${encodeURIComponent(name)}&select=id,score`, {
          headers: { apikey: SUPABASE_ANON_KEY }
        });
        if (!checkRes.ok) return;
        const records = await checkRes.json();

        if (records.length > 0) {
          const bestRecord = records.reduce((max, r) => r.score > max.score ? r : max, records[0]);
          const otherIds = records.filter(r => r.id !== bestRecord.id).map(r => r.id);

          if (score > bestRecord.score) {
            await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?id=eq.${bestRecord.id}`, {
              method: 'PATCH',
              headers: {
                apikey: SUPABASE_ANON_KEY,
                'Content-Type': 'application/json',
                Prefer: 'return=minimal'
              },
              body: JSON.stringify({ score, kills, created_at: new Date().toISOString() })
            });
          }

          if (otherIds.length > 0) {
            await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?id=in.(${otherIds.join(',')})`, {
              method: 'DELETE',
              headers: { apikey: SUPABASE_ANON_KEY }

        } else {
          await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
            method: 'POST',
            headers: {
              apikey: SUPABASE_ANON_KEY,
              'Content-Type': 'application/json',
              Prefer: 'return=minimal'
            },
            body: JSON.stringify({ player_name: name, score, kills })
          });
        }
      } catch (e) {}
    },

        ctx.globalCompositeOperation = 'lighter';
        ctx.font = 'bold 13px monospace';

        ctx.fillText('KILLS', cx + 280, startY);

        const timeSinceLoad = now - (this.loadTime || now);

        this.scores.forEach((entry, i) => {

          const animTime = Math.max(0, timeSinceLoad - delay);
          const animDuration = 400;
          let progress = animTime / animDuration;
          if (progress > 1) progress = 1;

          const easeProgress = 1 - Math.pow(1 - progress, 4);
          
          if (easeProgress <= 0) return;

          const y = startY + 30 + i * rowHeight;
          const isMe = entry.player_name === localName;
          
          const xOffset = (1 - easeProgress) * 50;
          const currentAlpha = easeProgress;

          ctx.save();
          ctx.translate(xOffset, 0);
          ctx.globalAlpha = currentAlpha;

          if (isMe) {
             ctx.fillStyle = 'rgba(255, 0, 127, 0.08)';
             ctx.fillRect(cx - 290, y - 6, 580, rowHeight);
             
             ctx.fillStyle = COLOR_PINK;
             ctx.fillRect(cx - 290, y - 6, 4, rowHeight);
          } else {
             ctx.fillStyle = i % 2 === 0 ? '#000000' : 'rgba(0,79,255,0.04)';
             ctx.fillRect(cx - 290, y - 6, 580, rowHeight);
          }

          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';

          if (i === 0) {
            const pulse = 0.5 + 0.5 * Math.sin(now * 0.005);
            setGlow('#ffd700', 10 + pulse * 15);
            ctx.fillStyle = '#ffd700';
          } else if (isMe) {
            setGlow(COLOR_PINK, 15);
            ctx.fillStyle = COLOR_PINK;
          } else if (i === 1) {
            setGlow('#c0c0c0', 10);
            ctx.fillStyle = '#c0c0c0';
          } else if (i === 2) {
            setGlow('#cd7f32', 8);
            ctx.fillStyle = '#cd7f32';
          } else {
            clearGlow();
            ctx.fillStyle = i % 2 === 0 ? '#ffffff' : COLOR_CYAN;
          }

          const textY = y - 6 + rowHeight / 2;

          ctx.fillText((i + 1) + '.', cx - 280, textY);
          ctx.fillText(entry.player_name, cx - 200, textY);
          ctx.textAlign = 'right';
          ctx.fillText(entry.score, cx + 180, textY);
          ctx.fillText(entry.kills, cx + 280, textY);
          
          ctx.restore();
        });
      }

      clearGlow();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      const pulse2 = 0.6 + 0.4 * Math.sin(now * 0.002);
      ctx.globalAlpha = pulse2;
      setGlow(COLOR_CYAN, 10);
      ctx.fillStyle = COLOR_CYAN;
      ctx.font = '13px monospace';
      ctx.fillText('[ ESC OR BACKSPACE TO RETURN ]', cx, H - 30);

      clearGlow();
      ctx.restore();
    }

    shakeTimer:     0,
    shakeIntensity: 0,
    slowmoTimer:    0,
    labelScale:     1,

    onKill(isElite, fromNuke = false) {
      this.kills++;
      this.totalKills++;
      player.score += isElite ? 50 : 10;
      player.onKill(isElite, fromNuke);

      if (isElite) {
        const type = ALT_FIRE_TYPES[altFireDropIndex % ALT_FIRE_TYPES.length];
        altFireDropIndex++;
        if (player.altFireType) {
          player.overdriveCharge = Math.min(player.OVERDRIVE_MAX, player.overdriveCharge + 24);
          pickups.popups.push({
            x: drone.x,
            y: drone.y - 40,
            label: 'OVERDRIVE +',
            color: '#ff6600',
            life: 900
          });
        } else {
          pickups.spawnAltFireOrb(drone.x + 60 + Math.random() * 80, drone.y + (Math.random() - 0.5) * 60, type);
        }
      }

      if (this.totalKills > 0 && this.totalKills % 100 === 0) {
        player.shield = true;
        player.shieldRechargeTimer = 0;
        streakCallout.show(`${this.totalKills} KILLS`, '#ffffff');
        this.flashTimer = this.FLASH_MS * 0.4;
        this.shakeTimer = 300;
        this.shakeIntensity = 6;
      }

      let speedY = dy * this.speed;

        speedY += dash.vy;

      this.y += speedY * dt;

        p.life -= delta;
        const dx = drone.x - p.x, dy = drone.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          const driftSpeed = 40 + Math.max(0, 200 - dist) * 0.8;
          p.x += (dx / dist) * driftSpeed * dt;
          p.y += (dy / dist) * driftSpeed * dt;
        }
        p.radius = 10 + 3 * Math.sin(getNow() * 0.008);

        if (dist < 28) {
          if (player.altFireType) {
            player.overdriveCharge = Math.min(player.OVERDRIVE_MAX, player.overdriveCharge + 18);
            this.popups.push({
              x: drone.x,
              y: drone.y - 34,
              label: 'OVERDRIVE +',
              color: '#ff6600',
              life: 900
            });
            return false;
          }
          const canCollect = player.altFireCooldown <= 0;
          if (!canCollect) return p.life > 0;
          player.activateAltFire(p.type);
          this.popups.push({
            x: drone.x,
            y: drone.y - 34,
            label: `${ALT_FIRE_LABELS[p.type]} READY`,
            color: p.type === 'spread' ? '#ffcc00' : '#ff6600',
            life: 1200
          });
          return false;
        }
        return p.life > 0;
      });

      this.popups = this.popups.filter(t => {
        t.y -= 40 * dt;
        t.life -= delta;
        return t.life > 0;
      });
    },

    draw() {
      this.pool.forEach(p => {
        const color = p.type === 'spread' ? '#ffcc00' : '#ff6600';
        const r = p.radius;
        ctx.save();
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3);
        grad.addColorStop(0, color + 'aa');
        grad.addColorStop(0.4, color + '44');
        grad.addColorStop(1, color + '00');
        ctx.globalAlpha = 0.75;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      this.popups.forEach(t => {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = 'bold 18px monospace';
        ctx.globalAlpha = Math.min(1, t.life / 500);
        ctx.fillStyle = t.color;
        ctx.fillText(t.label, t.x, t.y);
        ctx.restore();
      });
    },

    reset() { this.pool = []; this.popups = []; }
  };

  // ─── FLAMETHROWER ─────────────────────────────────────────────────────────────
  const flamethrower = {
    particles:    [],
    tickTimer:    0,
    TICK_INTERVAL: 80,
    RANGE:        220,
    CONE_ANGLE:   Math.PI / 180 * 25,
    startupProgress: 0,
    STARTUP_MS:  280,

    update(delta) {
      if (player.altFireType !== 'flame') {
        this.particles = [];
        this.tickTimer = 0;
        this.startupProgress = 0;
        return;
      }
      const dt       = delta / 1000;
      const holding  = (keys['k'] || keys['K']) && !player.overheated;
      const hasFuel  = player.flameFuel > 0;

      if (holding && hasFuel) {
        // Ramp up from ship to max range
        this.startupProgress = Math.min(1, this.startupProgress + delta / this.STARTUP_MS);
        const effectiveRange = this.RANGE * this.startupProgress;

        // Deplete fuel
        player.flameFuel = Math.max(0, player.flameFuel - 22 * dt);

        // Damage ticks
        this.tickTimer -= delta;
        if (this.tickTimer <= 0) {
          this.tickTimer = this.TICK_INTERVAL;
          player.heat = Math.min(100, player.heat + 2);
          this._dealDamage();
        }

        // Spawn rope fire particles — clamped to current reach
        for (let i = 0; i < 6; i++) {
          const t = 0.12 + Math.random() * 0.92;
          const angleWave = Math.sin(getNow() * 0.01 + t * 8) * 10;
          const a = ((Math.random() - 0.5) * 10 + angleWave) * Math.PI / 180;
          const dist = 22 + effectiveRange * t;
          this.particles.push({
            x:     drone.x + Math.cos(a) * dist,
            y:     drone.y + Math.sin(a) * dist,
            life:  110 + Math.random() * 120,
            size:  3 + Math.random() * 6,
            alpha: 0.6 + Math.random() * 0.3,
            warm:  Math.random() > 0.4,
          });
        }

        // Fuel depleted — end mode
        if (player.flameFuel <= 0) {
          player.altFireType = null;
          player.flameFuel = 0;
        }
      } else {
        // Retract when not firing
        this.startupProgress = Math.max(0, this.startupProgress - delta / (this.STARTUP_MS * 0.6));
      }

      // Fade particles
      this.particles = this.particles.filter(p => {
        p.life -= delta;
        p.alpha *= 0.96;
        return p.life > 0;
      });
    },

    _dealDamage() {
      const effectiveRange = this.RANGE * this.startupProgress;
      const dmg = Math.max(1, Math.ceil(player.effectiveDamage * 0.6));
      for (let i = shards.pool.length - 1; i >= 0; i--) {
        const s  = shards.pool[i];
        const dx = s.x - drone.x;
        const dy = s.y - drone.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > effectiveRange) continue;
        if (Math.abs(Math.atan2(dy, dx)) > this.CONE_ANGLE) continue;
        const killed = applyDamageToShard(s, dmg);
        hitSparks.emit(s.x, s.y, 1, 0, '#ff6600');
        if (killed) destroyShard(s);
      }
    },

    draw() {
      if (player.altFireType !== 'flame') return;
      const holding = (keys['k'] || keys['K']) && player.flameFuel > 0 && !player.overheated;
      const reach = this.startupProgress;

      if (holding || reach > 0) {
        const effectiveRange = this.RANGE * reach;
        ctx.save();
        const pulse = getNow() * 0.016;
        const ribbon = [];
        for (let i = 0; i <= 11; i++) {
          const t = i / 11;
          const x = drone.x + 16 + t * effectiveRange;
          const sway = (Math.sin(pulse + t * 5.5) * (2 + t * 10) + Math.sin(pulse * 0.6 + t * 10) * (1 + t * 5)) * reach;
          const y = drone.y + sway;
          const size = (6 + t * 24) * reach;
          ribbon.push({ x, y, t, size });
        }

        ctx.shadowColor = '#ff5a1f';
        ctx.shadowBlur = 26;
        ribbon.forEach((p, i) => {
          const backAlpha = 0.08 + p.t * 0.18;
          ctx.globalAlpha = backAlpha;
          ctx.fillStyle = '#ff4a1a';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = 0.12 + p.t * 0.26;
          ctx.fillStyle = '#ff8a1f';
          ctx.beginPath();
          ctx.arc(p.x + 2, p.y, p.size * 0.62, 0, Math.PI * 2);
          ctx.fill();

          if (i > 1) {
            ctx.globalAlpha = 0.16 + p.t * 0.34;
            ctx.fillStyle = p.t > 0.72 ? '#fff3bf' : '#ffd36a';
            ctx.beginPath();
            ctx.arc(p.x + 4, p.y, p.size * 0.28, 0, Math.PI * 2);
            ctx.fill();
          }
        });

        ctx.globalAlpha = 0.22 * reach;
        ctx.fillStyle = '#ff5a1f';
        ctx.beginPath();
        ctx.moveTo(drone.x + 14, drone.y - 4 * reach);
        ribbon.forEach(p => ctx.lineTo(p.x, p.y - p.size * 0.42));
        ribbon.slice().reverse().forEach(p => ctx.lineTo(p.x, p.y + p.size * 0.42));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      // Particles
      this.particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.shadowColor = p.warm ? '#ff8800' : '#ff5500';
        ctx.shadowBlur  = 12;
        ctx.fillStyle   = p.warm ? '#ffb347' : '#ff5500';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    },

    reset() {
      this.particles = [];
      this.tickTimer = 0;
      this.startupProgress = 0;
    }
  };

  const graze = {
    sparks: [],
    score:  0,

    check() {
      const isDashing = dash.duration > 0;
      const multiplier = isDashing ? 2 : 1;
      for (const s of shards.pool) {
        if (s._grazeCd > 0) continue;
        const dx = s.x - drone.x, dy = s.y - drone.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hitDist = s.size * 0.75 + 14;  // actual collision distance
        if (dist > hitDist && dist < hitDist + GRAZE_RADIUS) {
          // graze!
          s._grazeCd = GRAZE_COOLDOWN;
          player.score += 5 * multiplier;
          player.heat   = Math.max(0, player.heat - 8 * multiplier);
          player.overdriveCharge = Math.min(player.OVERDRIVE_MAX, player.overdriveCharge + 6 * multiplier);
          this.score   += multiplier;
          // spawn spark on the near side
          const angle = Math.atan2(dy, dx);
          const sx = drone.x + Math.cos(angle) * 16;
          const sy = drone.y + Math.sin(angle) * 16;
          this.sparks.push({
            x: sx, y: sy,
            vx: Math.cos(angle) * -120 + (Math.random() - 0.5) * 60,
            vy: Math.sin(angle) * -120 + (Math.random() - 0.5) * 60,
            life: 1,
            color: isDashing ? COLOR_CYAN : '#ffffff',
          });
        }
      }
    },

    update(delta) {
      const dt = delta / 1000;
      // tick graze cooldowns on shards
      for (const s of shards.pool) {
        if (s._grazeCd > 0) s._grazeCd -= delta;
      }
      this.sparks = this.sparks.filter(p => {
        p.x    += p.vx * dt;
        p.y    += p.vy * dt;
        p.life -= dt * 4;
        return p.life > 0;
      });
    },

    draw() {
      this.sparks.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    },

    reset() { this.sparks = []; this.score = 0; }
  };

  // ─── HELPER: is player pressing movement keys? ──────────────────────────────
  function isPlayerMoving() {
    return !!(keys['ArrowUp'] || keys['w'] || keys['W'] ||
              keys['ArrowDown'] || keys['s'] || keys['S'] ||
              keys['ArrowLeft'] || keys['a'] || keys['A'] ||
              keys['ArrowRight'] || keys['d'] || keys['D']);
  }

  // ─── HELPER: is fire button held? ─────────────────────────────────────────
  function isFireHeld() {
    return mouseDown || keys['j'] || keys['J'];
  }

  const player = {
    score:        0,
    dead:         false,
    lives:        3,
    deathMessage: '',
    invincibleTimer: 0,
    INVINCIBLE_DURATION: 300,
    altFireType: null,
    spreadFuel: 0,
    SPREAD_MAX_FUEL: 100,
    flameFuel: 0,
    FLAME_MAX_FUEL: 100,
    altFireCooldown: 0,
    ALT_FIRE_COOLDOWN: 5000,

    shield:              true,
    shieldRechargeTimer: 0,
    get SHIELD_RECHARGE() {
      const s = stage.current;
      return s <= 3 ? 8000 : s <= 6 ? 10000 : 12000;
    },

    heat:             0,
    overheated:       false,
    overheatTimer:    0,
    HEAT_PER_SHOT:    4,
    HEAT_DECAY:       30,
    OVERHEAT_LOCKOUT: 1500,

    overdriveCharge: 0,
    OVERDRIVE_MAX: 100,
    overdriveActive: false,
    overdriveTimer: 0,
    OVERDRIVE_DURATION: 5000,

    ultCharge:  0,
    ULT_MAX:    45,
    ultReady:   false,
    ultUses:    3,

    get effectiveDamage() {
      let dmg = 1.2 + (stage.current - 1) * 0.3;
      if (this.overdriveActive) dmg *= 1.2;
      return Math.ceil(dmg);
    },

    get fireRateCooldown() {
      let cd = 200;
      if (!isPlayerMoving()) cd *= 0.75;
      if (this.overdriveActive) cd *= 0.85;
      return Math.max(70, cd);
    },

    activateAltFire(type) {
      this.altFireType = type;
      this.altFireCooldown = this.ALT_FIRE_COOLDOWN;
      if (type === 'spread') {
        this.spreadFuel = this.SPREAD_MAX_FUEL;
        this.flameFuel = 0;
      } else if (type === 'flame') {
        this.flameFuel = this.FLAME_MAX_FUEL;
        this.spreadFuel = 0;
      }
    },

    hit() {
      if (this.dead || this.invincibleTimer > 0) return;

      if (this.shield) {
        this.shield = false;
        this.shieldRechargeTimer = this.lives === 1 ? 8000 : this.SHIELD_RECHARGE;
        stage.flashTimer = stage.FLASH_MS * 0.2;
        stage.shakeTimer = 300;
        stage.shakeIntensity = 4;
        return;
      }

      this.overdriveCharge = 0;
      this.overdriveActive = false;
      this.overdriveTimer = 0;
      this.altFireType = null;
      this.spreadFuel = 0;
      this.flameFuel = 0;
      this.lives--;
      this.invincibleTimer = this.INVINCIBLE_DURATION;

      if (this.lives <= 0) {
        this.dead = true;
        const isHighScore = this.score > save.highScore;
        if (isHighScore) save.highScore = this.score;
        this.deathMessage = isHighScore
          ? 'LETS GOOOOOO'
          : DEATH_TAUNTS[Math.floor(Math.random() * DEATH_TAUNTS.length)];
        save.runs.push({ score: this.score, kills: stage.totalKills });
        if (save.runs.length > 10) save.runs.shift();
        writeSave();

        if (this.score > 0) {
          if (!loadPlayerName()) {
            gameState = 'nameEntry';
          } else {
            leaderboard.submitScore(this.score, stage.totalKills);
          }
        }
      } else {
        stage.flashTimer = stage.FLASH_MS * 0.4;
        stage.shakeTimer = 700;
        stage.shakeIntensity = 10;
      }
    },

    update(delta) {
      if (this.invincibleTimer > 0) this.invincibleTimer = Math.max(0, this.invincibleTimer - delta);
      if (this.altFireCooldown > 0) this.altFireCooldown = Math.max(0, this.altFireCooldown - delta);

      if (!this.shield && this.shieldRechargeTimer > 0) {
        this.shieldRechargeTimer -= delta;
        if (this.shieldRechargeTimer <= 0) {
          this.shield = true;
          this.shieldRechargeTimer = 0;
        }
      }

      const dt = delta / 1000;
      if (this.overheated) {
        this.overheatTimer -= delta;
        if (this.overheatTimer <= 0) {
          this.overheated = false;
          this.overheatTimer = 0;
          this.heat = 0;
        }
      } else {
        const flameFiring = this.altFireType === 'flame' && this.flameFuel > 0 && (keys['k'] || keys['K']);
        if (!isFireHeld() && !flameFiring) {
          this.heat = Math.max(0, this.heat - this.HEAT_DECAY * (this.overdriveActive ? 3 : 1) * dt);
        }
        if (this.heat >= 100) {
          this.overheated = true;
          this.overheatTimer = this.OVERHEAT_LOCKOUT;
        }
      }

      if (this.altFireType === 'spread' && this.spreadFuel <= 0) {
        this.spreadFuel = 0;
        this.altFireType = null;
      }
      if (this.altFireType === 'flame' && this.flameFuel <= 0) {
        this.flameFuel = 0;
        this.altFireType = null;
      }

      if (this.overdriveActive) {
        this.overdriveTimer -= delta;
        if (this.overdriveTimer <= 0) {
          this.overdriveActive = false;
          this.overdriveTimer = 0;
        }
      } else if (this.overdriveCharge >= this.OVERDRIVE_MAX) {
        this.overdriveActive = true;
        this.overdriveTimer = this.OVERDRIVE_DURATION;
        this.overdriveCharge = 0;
        streakCallout.showOverdrive();
      }
    },

    onKill(isElite = false, fromNuke = false) {
      if (!this.overdriveActive) {
        const gain = isElite ? 18 : 4;
        this.overdriveCharge = Math.min(this.OVERDRIVE_MAX, this.overdriveCharge + gain);
      }

      if (!this.ultReady && !fromNuke && this.ultUses > 0) {
        this.ultCharge = Math.min(this.ULT_MAX, this.ultCharge + 1);
        if (this.ultCharge >= this.ULT_MAX) this.ultReady = true;
      }
    }
  };

  // SCREEN NUKE --------------------------------------------------------------
  const screenNuke = {
    active:   false,
    ring:     0,       // expanding radius
    maxRing:  0,       // max radius to cover screen
    flash:    0,       // white flash alpha
    rings:    [],      // color rings for visual effect

    fire() {
      if (!player.ultReady || this.active || player.ultUses <= 0) return;
      player.ultReady = false;
      player.ultUses--;
      player.ultCharge = 0;
      this.active  = true;
      this.ring    = 0;
      this.maxRing = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);
      this.flash   = 1;
      this.rings   = [
        { r: 0, color: '#ffffff', width: 6, speed: 1.0 },
        { r: 0, color: COLOR_CYAN,   width: 4, speed: 0.85 },
        { r: 0, color: COLOR_PINK,   width: 3, speed: 0.7 },
      ];
      // screen shake
      stage.shakeTimer     = 800;
      stage.shakeIntensity = 14;
      // slow-mo for dramatic effect
      stage.slowmoTimer    = 600;
    },

    update(delta) {
      if (!this.active) return;
      const dt  = delta / 1000;
      const spd = 1800; // px/s expansion speed

      // expand rings
      for (const r of this.rings) {
        r.r += spd * r.speed * dt;
      }
      this.ring = this.rings[0].r;

      // flash fades
      this.flash = Math.max(0, this.flash - dt * 3);

      // kill enemies the leading ring passes over
      for (let i = shards.pool.length - 1; i >= 0; i--) {
        const s  = shards.pool[i];
        const dx = s.x - drone.x, dy = s.y - drone.y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d <= this.ring && !s._nuked) {
          s._nuked = true;
          s.shieldHp = 0;
          s.hp       = 0;
          // kill FX
          impactFX.onKill(s.x, s.y, s.color);
          fragments.burst(s.x, s.y, s.color, s.size, s.isElite);
          burstParticles.spawn(s.x, s.y, s.color);
          smokeParticles.spawn(s.x, s.y, s.color);
          stage.onKill(s.isElite, true); // fromNuke=true: no ult charge
          shards.pool.splice(i, 1);
        }
      }

      // done when all rings expanded past screen
      if (this.rings[this.rings.length - 1].r > this.maxRing) {
        this.active = false;
        this.rings  = [];
      }
    },

    draw() {
      if (!this.active) return;

      // white flash overlay
      if (this.flash > 0) {
        ctx.save();
        ctx.globalAlpha    = this.flash * 0.4;
        ctx.fillStyle      = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      // expanding rings
      for (const r of this.rings) {
        if (r.r <= 0) continue;
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - r.r / this.maxRing);
        ctx.strokeStyle = r.color;
        ctx.lineWidth   = r.width;
        ctx.beginPath();
        ctx.arc(drone.x, drone.y, r.r, 0, Math.PI * 2);
        ctx.stroke();
        // bloom pass — wider, dimmer
        ctx.globalAlpha *= 0.3;
        ctx.lineWidth    = r.width * 4;
        ctx.stroke();
        ctx.restore();
      }
    },

    reset() {
      this.active = false;
      this.ring   = 0;
      this.flash  = 0;
      this.rings  = [];
    }
  };

  // ─── CHAIN LIGHTNING ─────────────────────────────────────────────────────────
  const chainLightning = {
    bolts: [],   // { segments: [{x,y}], life, color }
    RANGE: 120,

    // called on each kill when chain >= 8
    trigger(killX, killY) {
      const arcs = player.chain >= 15 ? 2 : 1;
      const used = new Set();

      for (let a = 0; a < arcs; a++) {
        let best = null, bestDist = this.RANGE;
        for (const s of shards.pool) {
          if (used.has(s)) continue;
          const dx = s.x - killX, dy = s.y - killY;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; best = s; }
        }
        if (!best) break;
        used.add(best);

        // deal damage
        const killed = applyDamageToShard(best, 3);
        best.flashTimer = 200;
        best.hpBarTimer = 1500;
        hitSparks.emit(best.x, best.y, 1, 0, COLOR_CYAN);

        // generate zigzag bolt segments
        const segs = [{ x: killX, y: killY }];
        const steps = 6 + Math.floor(Math.random() * 4);
        for (let i = 1; i < steps; i++) {
          const t  = i / steps;
          const mx = killX + (best.x - killX) * t + (Math.random() - 0.5) * 30;
          const my = killY + (best.y - killY) * t + (Math.random() - 0.5) * 30;
          segs.push({ x: mx, y: my });
        }
        segs.push({ x: best.x, y: best.y });

        this.bolts.push({ segments: segs, life: 1, color: COLOR_CYAN });

        // if target dies from lightning, kill it
        if (killed) destroyShard(best);
      }
    },

    update(delta) {
      const dt = delta / 1000;
      this.bolts = this.bolts.filter(b => {
        b.life -= dt * 5;  // fade in ~0.2s
        return b.life > 0;
      });
    },

    draw() {
      for (const b of this.bolts) {
        ctx.save();
        ctx.globalAlpha = b.life * 0.9;
        ctx.strokeStyle = b.color;
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.moveTo(b.segments[0].x, b.segments[0].y);
        for (let i = 1; i < b.segments.length; i++) {
          ctx.lineTo(b.segments[i].x, b.segments[i].y);
        }
        ctx.stroke();
        // bloom pass
        ctx.globalAlpha = b.life * 0.3;
        ctx.lineWidth   = 6;
        ctx.stroke();
        ctx.restore();
      }
    },

    reset() { this.bolts = []; }
  };

  // ─── SHARD SHAPES ────────────────────────────────────────────────────────────
  function makeShardShape(size) {
    const pts   = [];
    const count = 5 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const angle  = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.9;
      const radius = size * (0.5 + Math.random() * 0.6);
      pts.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius });
    }
    return pts;
  }

  function makeSharpShard(size) {
    const pts  = [];
    const len  = size * (1.8 + Math.random() * 1.4);
    const wid  = size * (0.18 + Math.random() * 0.22);
    const sides = Math.random() < 0.5 ? 4 : 5;

    if (sides === 4) {
      pts.push({ x:  len * 0.5,  y: 0 });
      pts.push({ x:  len * 0.05, y:  wid + (Math.random() - 0.5) * wid * 0.4 });
      pts.push({ x: -len * 0.5,  y: 0 });
      pts.push({ x:  len * 0.05, y: -wid + (Math.random() - 0.5) * wid * 0.4 });
    } else {
      pts.push({ x:  len * 0.5,  y: 0 });
      pts.push({ x:  len * 0.15, y:  wid });
      pts.push({ x: -len * 0.1,  y:  wid * 0.5 + (Math.random() - 0.5) * wid });
      pts.push({ x: -len * 0.5,  y: 0 });
      pts.push({ x:  len * 0.05, y: -wid });
    }
    return pts;
  }

  // ─── ENEMY HELPERS ────────────────────────────────────────────────────────────
  function getStageEnemyStats() {
    const s   = stage.current;
    const cfg = STAGE_CONFIG[s - 1];
    return {
      color:      STAGE_ENEMY_COLORS[s - 1],
      eliteColor: STAGE_ELITE_COLORS[s - 1],
      speed:      cfg.speed,
      baseHp:     s === 1 ? 2 : 3 + Math.floor((s - 1) * 0.8),
      turnRate:   0.5 + (s - 1) * 0.22,
    };
  }

  function spawnShard() {
    const stats   = getStageEnemyStats();
    const cfg     = STAGE_CONFIG[stage.current - 1];
    const isElite = Math.random() < cfg.eliteChance;
    if (cfg.multiEdge && Math.random() < 0.35) {
      const fromTop = Math.random() < 0.5;
      const x = canvas.width * 0.25 + Math.random() * canvas.width * 0.5;
      const y = fromTop ? -30 : canvas.height + 30;
      return shards._makeShard(x, y, stats, isElite, true, fromTop ? 'top' : 'bottom');
    }
    const y = 40 + Math.random() * (canvas.height - 80);
    return shards._makeShard(canvas.width + 30, y, stats, isElite, true);
  }

  function spawnKamikaze() {
    const cfg   = STAGE_CONFIG[stage.current - 1];
    const speed = (450 + Math.random() * 100) * (player.lives === 1 ? 1.2 : 1);
    let x, y;
    if (cfg.multiEdge && Math.random() < 0.4) {
      const fromTop = Math.random() < 0.5;
      x = canvas.width * 0.1 + Math.random() * canvas.width * 0.8;
      y = fromTop ? -20 : canvas.height + 20;
    } else {
      x = canvas.width + 20;
      y = 60 + Math.random() * (canvas.height - 120);
    }
    const angle = Math.atan2(drone.y - y, drone.x - x);
    const size  = 10;
    return {
      x,
      y,
      size,
      color:      '#ff4400',
      vx:         Math.cos(angle) * speed,
      vy:         Math.sin(angle) * speed,
      angle:      Math.random() * Math.PI * 2,
      spin:       0.14,
      pts:        makeShardShape(size),
      hp:         1,
      maxHp:      1,
      isElite:    false,
      isKamikaze: true,
      isMini:     false,
      turnRate:   0,
      flashTimer: 0,
      hpBarTimer: 0,
      _grazeCd:   0,
    };
  }

  function spawnDrift() {
    const stats = getStageEnemyStats();
    const cfg   = STAGE_CONFIG[stage.current - 1];
    const size  = 8 + Math.random() * 10;
    const speed = 100 + Math.random() * 100;
    const color = stats.color;
    let x, y, angle;
    if (cfg.multiEdge && Math.random() < 0.35) {
      const fromTop = Math.random() < 0.5;
      x     = canvas.width * 0.2 + Math.random() * canvas.width * 0.6;
      y     = fromTop ? -size : canvas.height + size;
      // drift inward: downward from top, upward from bottom, with slight leftward bias
      angle = fromTop
        ? Math.PI * 0.5  + (Math.random() - 0.5) * 0.6   // ~60°-120° (downward)
        : Math.PI * 1.5  + (Math.random() - 0.5) * 0.6;  // ~240°-300° (upward)
    } else {
      x     = canvas.width + size;
      y     = 30 + Math.random() * (canvas.height - 60);
      angle = Math.PI + (Math.random() - 0.5) * 0.7;     // 160°-200° (leftward)
    }
    return {
      x,
      y,
      size,
      color,
      vx:         Math.cos(angle) * speed,
      vy:         Math.sin(angle) * speed,
      angle:      Math.random() * Math.PI * 2,
      spin:       (Math.random() - 0.5) * 0.08,
      pts:        makeShardShape(size),
      hp:         1 + Math.floor(stage.current / 4),
      maxHp:      1 + Math.floor(stage.current / 4),
      isElite:    false,
      isKamikaze: false,
      isDrift:    true,
      isMini:     false,
      turnRate:   0,       // no homing
      flashTimer: 0,
      hpBarTimer: 0,
      _grazeCd:   0,
    };
  }

  function spawnMini(x, y, color) {
    const stats = getStageEnemyStats();
    const speed = stats.speed * 1.5;
    const angle = Math.random() * Math.PI * 2;
    const size  = 7;
    return {
      x, y,
      size,
      color,
      vx:         Math.cos(angle) * speed,
      vy:         Math.sin(angle) * speed,
      angle:      Math.random() * Math.PI * 2,
      spin:       (Math.random() - 0.5) * 0.12,
      pts:        makeShardShape(size),
      hp:         1,
      maxHp:      1,
      isElite:    false,
      isKamikaze: false,
      isMini:     true,
      turnRate:   stats.turnRate * 1.5,
      flashTimer: 0,
      hpBarTimer: 0,
      _grazeCd:   0,
    };
  }

  // ─── GLASS SHARDS (ENEMIES) ──────────────────────────────────────────────────
  const shards = {
    pool:          [],
    spawnTimer:    0,
    kamikazeTimer: 0,

    _makeShard(x, y, stats, isElite, enableMechanics = false, edge = 'right') {
      const size   = (14 + Math.random() * 18) * (isElite ? 1.4 : 1);
      const color  = isElite ? stats.eliteColor || stats.color : stats.color;
      const rawSpd = stats.speed + Math.random() * 80;
      const speed  = player.lives === 1 ? rawSpd * 1.2 : rawSpd;
      const baseHp = stats.baseHp * (isElite ? 2 : 1);
      let vx, vy;
      if (edge === 'top') {
        vx = -(speed * 0.3 + Math.random() * speed * 0.2);
        vy =   speed * 0.7 + Math.random() * speed * 0.3;
      } else if (edge === 'bottom') {
        vx = -(speed * 0.3 + Math.random() * speed * 0.2);
        vy = -(speed * 0.7 + Math.random() * speed * 0.3);
      } else {
        vx = -speed;
        vy = (Math.random() - 0.5) * 40;
      }
      const shard = {
        x, y, size, color,
        vx,
        vy,
        angle:      Math.random() * Math.PI * 2,
        spin:       (Math.random() - 0.5) * 0.06,
        pts:        makeShardShape(size),
        hp:         baseHp,
        maxHp:      baseHp,
        isElite,
        isKamikaze: false,
        isMini:     false,
        turnRate:   stats.turnRate || 0.5,
        flashTimer: 0,
        hpBarTimer: 0,
        lifetime:   8000 + Math.random() * 4000,
        _grazeCd:   0,
      };
      if (enableMechanics) this._applyMechanics(shard, getActiveMechanics());
      return shard;
    },

    _applyMechanics(shard, active) {
      shard.isSniper = active.has('snipers') && !shard.isElite && !shard.isMini && Math.random() < 0.28;
      shard.sniperCooldown = shard.isSniper ? 700 + Math.random() * 900 : 0;
      shard.sniperWindup = 0;
      shard.shieldHp = active.has('shielded') ? (shard.isElite ? 8 : 4) : 0;
      shard.maxShieldHp = shard.shieldHp;
    },

    get spawnInterval() { return STAGE_CONFIG[stage.current - 1].spawnInterval; },
    get maxEnemies()    { return STAGE_CONFIG[stage.current - 1].maxEnemies; },
    get homingChance()  { return STAGE_CONFIG[stage.current - 1].homingChance; },

    update(delta) {
      const dt     = delta / 1000;
      const active = getActiveMechanics();

      this.spawnTimer += delta;
      if (this.spawnTimer >= this.spawnInterval && this.pool.length < this.maxEnemies) {
        this.spawnTimer = 0;
        const count = stage.current === 1
          ? 2 + Math.floor(Math.random() * 2)
          : 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count && this.pool.length < this.maxEnemies; i++) {
          if (Math.random() < this.homingChance) {
            this.pool.push(spawnShard());
          } else {
            this.pool.push(spawnDrift());
          }
        }
      }

      if (active.has('kamikazes')) {
        if (this.kamikazeTimer > 0) this.kamikazeTimer -= delta;
        if (this.kamikazeTimer <= 0 && this.pool.length < this.maxEnemies) {
          this.pool.push(spawnKamikaze());
          this.kamikazeTimer = STAGE_CONFIG[stage.current - 1].kamikazeInterval || 2500;
        }
      }

      this.pool = this.pool.filter(s => {
        if (s.isSniper) {
          if (s.sniperWindup > 0) {
            s.sniperWindup -= delta;
            s.vx *= 0.92;
            s.vy *= 0.92;
            if (s.sniperWindup <= 0) {
              enemyBullets.fire(s.x, s.y, drone.x, drone.y);
              s.sniperCooldown = 1400 + Math.random() * 1000;
              s.sniperWindup = 0;
            }
          } else {
            s.sniperCooldown -= delta;
            if (s.sniperCooldown <= 0) {
              s.sniperWindup = 450;
              s.sniperCooldown = 999999;
            }
          }
        }

        if (!s.isKamikaze) {
          const curAngle = Math.atan2(s.vy, s.vx);
          const tgtAngle = Math.atan2(drone.y - s.y, drone.x - s.x);
          let diff = tgtAngle - curAngle;
          while (diff >  Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const maxTurn  = s.turnRate * dt;
          const turn     = Math.min(Math.abs(diff), maxTurn) * Math.sign(diff);
          const newAngle = curAngle + turn;
          const spd      = Math.hypot(s.vx, s.vy);
          s.vx = Math.cos(newAngle) * spd;
          s.vy = Math.sin(newAngle) * spd;
        }

        s.x     += s.vx * dt;
        s.y     += s.vy * dt;
        s.angle += s.spin;

        if (s.flashTimer > 0) s.flashTimer -= delta;
        if (s.hpBarTimer > 0) s.hpBarTimer -= delta;
        if (s.lifetime  !== undefined) s.lifetime -= delta;

        return s.x > -80 && (s.lifetime === undefined || s.lifetime > 0);
      });
    },

    draw() {
      this.pool.forEach(s => {
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.angle);

        const drawColor = s.flashTimer > 0 ? '#ffffff' : s.color;

        ctx.beginPath();
        ctx.moveTo(s.pts[0].x, s.pts[0].y);
        s.pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();

        ctx.fillStyle   = drawColor;
        ctx.globalAlpha = 0.08;
        ctx.fill();

        ctx.globalAlpha = 0.5;
        setGlow(drawColor, s.isElite ? 28 : 18);
        ctx.strokeStyle = drawColor;
        ctx.lineWidth   = s.isElite ? 3.5 : 2.5;
        ctx.stroke();

        ctx.globalAlpha = 1;
        setGlow('#ffffff', 6);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth   = 0.75;
        ctx.stroke();

        const crack = s.pts;
        setGlow(drawColor, 10);
        ctx.strokeStyle = drawColor;
        ctx.lineWidth   = 0.5;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(crack[0].x * 0.6, crack[0].y * 0.6);
        ctx.lineTo(crack[Math.floor(crack.length / 2)].x * 0.6,
                   crack[Math.floor(crack.length / 2)].y * 0.6);
        ctx.stroke();

        if (s.isElite) {
          const pulse = Math.sin(getNow() * 0.008) * 0.5 + 0.5;
          ctx.globalAlpha = 0.3 + pulse * 0.45;
          setGlow(s.color, 38);
          ctx.strokeStyle = s.color;
          ctx.lineWidth   = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, s.size * (1.3 + pulse * 0.15), 0, Math.PI * 2);
          ctx.stroke();
        }

        if (s.maxShieldHp > 0 && s.shieldHp > 0) {
          const shieldPulse = 0.65 + 0.35 * Math.sin(getNow() * 0.01 + s.x * 0.01);
          ctx.globalAlpha = 0.35 + shieldPulse * 0.25;
          setGlow('#ffffff', 16);
          ctx.strokeStyle = '#9be7ff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, s.size * 1.05, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (s.isSniper && s.sniperWindup > 0) {
          const windup = 1 - s.sniperWindup / 450;
          ctx.globalAlpha = 0.4 + windup * 0.5;
          setGlow('#ff8844', 14);
          ctx.strokeStyle = '#ff8844';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo((drone.x - s.x) * Math.min(1, windup), (drone.y - s.y) * Math.min(1, windup));
          ctx.stroke();
        }

        clearGlow();
        ctx.restore();

        if (s.hpBarTimer > 0 && (s.maxHp > 1 || s.maxShieldHp > 0)) {
          const barW  = s.size * 2.2;
          const barH  = 3;
          const barX  = s.x - barW / 2;
          const barY  = s.y - s.size * 1.6;
          const frac  = Math.max(0, s.hp / s.maxHp);
          const fade  = Math.min(1, s.hpBarTimer / 200);
          ctx.save();
          ctx.globalAlpha = fade * 0.85;
          ctx.fillStyle = '#000000';
          ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
          ctx.fillStyle = '#333333';
          ctx.fillRect(barX, barY, barW, barH);
          const r = Math.round(255 * (1 - frac));
          const g = Math.round(200 * frac);
          ctx.fillStyle = `rgb(${r},${g},0)`;
          ctx.fillRect(barX, barY, barW * frac, barH);
          if (s.maxShieldHp > 0 && s.shieldHp > 0) {
            const shieldFrac = Math.max(0, s.shieldHp / s.maxShieldHp);
            ctx.fillStyle = '#0d1c24';
            ctx.fillRect(barX, barY - 5, barW, 2);
            ctx.fillStyle = '#9be7ff';
            ctx.fillRect(barX, barY - 5, barW * shieldFrac, 2);
          }
          ctx.restore();
        }
      });
    },

    reset() {
      this.pool          = [];
      this.spawnTimer    = 0;
      this.kamikazeTimer = 0;
    }
  };

      const angle = Math.atan2(targetY - y, targetX - x);
      const speed = 320 + stage.current * 14;
      this.pool.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 2600 });
    },

    update(delta) {
      const dt = delta / 1000;
      this.pool = this.pool.filter(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= delta;
        return b.life > 0 && b.x > -40 && b.x < canvas.width + 40 && b.y > -40 && b.y < canvas.height + 40;
      });
    },

    draw() {
      this.pool.forEach(b => {
        ctx.save();
        setGlow('#ff8844', 12);
        ctx.strokeStyle = '#ff8844';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(b.x - b.vx * 0.03, b.y - b.vy * 0.03);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        clearGlow();
        ctx.restore();
      });
    },

    reset() { this.pool = []; }
  };

  function circlesTouch(ax, ay, ar, bx, by, br) {
    const dx = ax - bx, dy = ay - by;
    return dx * dx + dy * dy < (ar + br) * (ar + br);
  }

  function applyDamageToShard(s, damage, options = {}) {
    if (!options.bypassShield && s.shieldHp > 0) {
      s.shieldHp = Math.max(0, s.shieldHp - damage);
      s.flashTimer = 80;
      s.hpBarTimer = 900;
      impactFX.onHit(s.x, s.y, '#9be7ff');
      return false;
    }
    s.hp -= damage;
    if (s.hp <= 0) return true;
    s.flashTimer = 80;
    s.hpBarTimer = 900;
    return false;
  }

  function destroyShard(s) {
    fragments.burst(s.x, s.y, s.color, s.size, s.isElite);
    impactFX.onKill(s.x, s.y, s.color);
    smokeParticles.spawn(s.x, s.y, s.color);
    const idx = shards.pool.indexOf(s);
    if (idx >= 0) shards.pool.splice(idx, 1);
    stage.onKill(s.isElite);
  }

  function checkCollisions() {
    const aliveBullets = [];

    for (const b of bullets.pool) {
      let bulletAlive = true;

      for (let i = shards.pool.length - 1; i >= 0; i--) {
        const s = shards.pool[i];
        if (circlesTouch(b.x, b.y, b.hitRadius || 8, s.x, s.y, s.size * 0.75)) {
          const shielded = s.shieldHp > 0;
          const killed = applyDamageToShard(s, b.damage || player.effectiveDamage);
          hitSparks.emit(b.x, b.y, 1, 0, shielded ? '#9be7ff' : s.color);
          impactFX.onHit(b.x, b.y, shielded ? '#9be7ff' : s.color);
          if (killed) destroyShard(s);
          if (b.pierce > 0) {
            b.pierce--;
          } else {
            bulletAlive = false;
            break;
          }
        }
      }

      if (bulletAlive) aliveBullets.push(b);
    }
    bullets.pool = aliveBullets;

    enemyBullets.pool = enemyBullets.pool.filter(b => {
      if (circlesTouch(b.x, b.y, 7, drone.x, drone.y, 14)) {
        player.hit();
        return false;
      }
      return true;
    });

    for (let i = shards.pool.length - 1; i >= 0; i--) {
      const s = shards.pool[i];
      if (circlesTouch(s.x, s.y, s.size * 0.75, drone.x, drone.y, 14)) {
        if (dash.duration > 0) {
          const killed = applyDamageToShard(s, 5, { bypassShield: true });
          dash.hitEnemy = true;
          hitSparks.emit(s.x, s.y, -1, 0, COLOR_CYAN);
          impactFX.onHit(s.x, s.y, COLOR_CYAN);
          if (killed) {
            destroyShard(s);
          } else {
            s.flashTimer = 80;
            s.hpBarTimer = 900;
          }
        } else {
          if (s.isKamikaze) {
            fragments.burst(s.x, s.y, s.color, s.size, false);
            burstParticles.spawn(s.x, s.y, s.color);
          }
          shards.pool.splice(i, 1);
          player.hit();
        }
      }
    }
    graze.check();
  }
  // ─── HUD ─────────────────────────────────────────────────────────────────────
  function drawHUD() {
    const stageColor = STAGE_ENEMY_COLORS[Math.min(stage.current - 1, 9)];

      ? player.overdriveTimer / player.OVERDRIVE_DURATION
      : player.overdriveCharge / player.OVERDRIVE_MAX;

    ctx.save();

      ctx.globalAlpha = 0.25;
      ctx.fillStyle = hudColor;
      ctx.fillRect(0, 0, canvas.width, 3);

      ctx.fillStyle = hudColor;
      ctx.fillRect(0, 0, canvas.width * timeFrac, 3);

    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';

    {
      const shieldX = 130, shieldY = 28, shieldR = 8;

        ctx.stroke();
        clearGlow();
      } else if (player.shieldRechargeTimer > 0) {

        const progress = 1 - player.shieldRechargeTimer / maxT;
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = COLOR_CYAN;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(shieldX, shieldY, shieldR, -Math.PI * 0.8, Math.PI * 0.8);
        ctx.stroke();
        ctx.globalAlpha = 0.7;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(shieldX, shieldY, shieldR, -Math.PI * 0.8, -Math.PI * 0.8 + Math.PI * 1.6 * progress);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    ctx.fillText(`STAGE  ${stage.current} / 10`, 20, 50);
    ctx.fillText(`TIME  ${timeLeft}s   KILLS  ${stage.kills}`, 20, 80);

    const mechanicLabels = { snipers: 'SNIPERS', shielded: 'SHIELDED', darkness: 'DARKNESS' };
    const incoming = [...active].filter(m => mechanicLabels[m]);
    if (incoming.length > 0) {
      ctx.font = '16px monospace';
      ctx.globalAlpha = 0.72;
      ctx.fillText(`ACTIVE: ${incoming.map(m => mechanicLabels[m]).join(' � ')}`, 20, 112);
      ctx.globalAlpha = 1;
      ctx.font = 'bold 21px monospace';
    }

    const odY = incoming.length > 0 ? 138 : 112;
    ctx.font = '13px monospace';
    ctx.fillStyle = player.overdriveActive ? '#ff6600' : '#888888';
    setGlow(player.overdriveActive ? '#ff6600' : 'transparent', player.overdriveActive ? 10 : 0);
    ctx.fillText(player.overdriveActive ? 'OVERDRIVE  [PIERCE ON]' : 'OVERDRIVE', 20, odY);
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(20, odY + 16, 160, 6);
    ctx.globalAlpha = player.overdriveActive ? 1 : 0.75;
    ctx.fillStyle = player.overdriveActive ? '#ff6600' : COLOR_CYAN;
    ctx.fillRect(20, odY + 16, 160 * Math.max(0, Math.min(1, overdriveFrac)), 6);
    ctx.globalAlpha = 1;

    // ── Right side HUD ──────────────────────────────────────────────────────────
    ctx.textAlign = 'right';
    ctx.fillStyle = hudColor;
    setGlow(hudColor, 10);
    ctx.font = 'bold 21px monospace';
    ctx.fillText(`SCORE  ${player.score}`, canvas.width - 20, 20);

    const rightX = canvas.width - 20;
    const barLeft = rightX - 160;
    const dashReady = dash.cooldown <= 0;

    ctx.fillStyle = '#ffffff';
    setGlow('#ffffff', 16);
    ctx.font = '14px monospace';
    ctx.fillText('[J / MOUSE] FIRE', rightX, 52);

    // ── Alt-fire display ──────────────────────────────────────────────────────
    if (player.altFireType === 'spread') {
      const frac = Math.max(0, player.spreadFuel / player.SPREAD_MAX_FUEL);
      const spreadActive = (keys['k'] || keys['K']) && player.spreadFuel > 0;
      setGlow('#ffcc00', 14);
      ctx.fillStyle = '#ffcc00';
      ctx.fillText(spreadActive ? '[K] SPREAD ▶' : '[K] SPREAD', rightX, 76);
      ctx.globalAlpha = 0.18; ctx.fillStyle = '#ffffff';
      ctx.fillRect(barLeft, 90, 160, 5);
      ctx.globalAlpha = 1; ctx.fillStyle = spreadActive ? '#ffd84d' : '#ffcc00';
      ctx.fillRect(barLeft, 90, 160 * frac, 5);
      ctx.globalAlpha = 1;
    } else if (player.altFireType === 'flame') {
      const frac = Math.max(0, player.flameFuel / player.FLAME_MAX_FUEL);
      const flameActive = (keys['k'] || keys['K']) && player.flameFuel > 0;
      setGlow('#ff6600', 14);
      ctx.fillStyle = '#ff6600';
      ctx.fillText(flameActive ? '[K] FLAME ▶' : '[K] FLAME', rightX, 76);
      ctx.globalAlpha = 0.18; ctx.fillStyle = '#ffffff';
      ctx.fillRect(barLeft, 90, 160, 5);
      ctx.globalAlpha = 1; ctx.fillStyle = flameActive ? '#ff4400' : '#ff6600';
      ctx.fillRect(barLeft, 90, 160 * frac, 5);
      ctx.globalAlpha = 1;
    } else if (player.altFireCooldown > 0) {
      setGlow('#555555', 4);
      ctx.fillStyle = '#555555';
      ctx.fillText(`[K] CD  ${(player.altFireCooldown / 1000).toFixed(1)}s`, rightX, 76);
    } else {
      setGlow('#555555', 4);
      ctx.fillStyle = '#555555';
      ctx.fillText('[K] awaiting drop', rightX, 76);
    }

    // ── Dash ──────────────────────────────────────────────────────────────────
    ctx.fillStyle = dashReady ? COLOR_CYAN : '#888888';
    setGlow(dashReady ? COLOR_CYAN : '#888888', dashReady ? 12 : 4);
    ctx.fillText(dashReady ? '[SPC] DASH' : `[SPC] ${(dash.cooldown / 1000).toFixed(1)}s`, rightX, 108);

    // ── Nuke — 3-icon display ─────────────────────────────────────────────────
    const nukeY = 130;
    const nukeUsesLeft = player.ultUses;
    const nukeLabel = nukeUsesLeft <= 0 ? '[Q] NUKE GONE'
      : player.ultReady ? '[Q] NUKE READY'
      : `[Q] NUKE  ${Math.floor((player.ultCharge / player.ULT_MAX) * 100)}%`;
    ctx.fillStyle = nukeUsesLeft <= 0 ? '#333333' : (player.ultReady ? '#ffffff' : COLOR_PINK);
    setGlow(nukeUsesLeft <= 0 ? 'transparent' : (player.ultReady ? '#ffffff' : COLOR_PINK), player.ultReady ? 18 : 10);
    ctx.fillText(nukeLabel, rightX, nukeY);

    // 3 diamond icons
    const iconSpacing = 22;
    const iconH = 10;
    const iconsY = nukeY + 14;
    for (let i = 0; i < 3; i++) {
      const ix = rightX - i * iconSpacing;
      const filled = (2 - i) < nukeUsesLeft;
      const isReady = filled && player.ultReady && (2 - i) === nukeUsesLeft - 1;
      ctx.save();
      if (isReady) {
        const pulse = Math.sin(getNow() * 0.006) * 0.3 + 0.7;
        setGlow('#ffffff', 20 * pulse);
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = '#ffffff';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
      } else if (filled) {
        setGlow(COLOR_PINK, 8);
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = COLOR_PINK;
        ctx.fillStyle = 'rgba(255,0,127,0.2)';
      } else {
        clearGlow();
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = '#555555';
        ctx.fillStyle = 'transparent';
      }
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ix, iconsY - iconH);
      ctx.lineTo(ix + iconH * 0.6, iconsY);
      ctx.lineTo(ix, iconsY + iconH);
      ctx.lineTo(ix - iconH * 0.6, iconsY);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    // charge bar below icons
    const chargeBarY = iconsY + iconH + 5;
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(barLeft, chargeBarY, 160, 4);
    ctx.globalAlpha = nukeUsesLeft <= 0 ? 0.15 : (player.ultReady ? 1 : 0.7);
    ctx.fillStyle = player.ultReady ? '#ffffff' : COLOR_PINK;
    ctx.fillRect(barLeft, chargeBarY, 160 * Math.min(1, player.ultCharge / player.ULT_MAX), 4);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.font = '14px monospace';
    ctx.globalAlpha = 0.42;
    clearGlow();
    ctx.fillStyle = '#ffffff';
    ctx.fillText('[ESC] PAUSE', canvas.width - 20, canvas.height - 16);

    clearGlow();
    ctx.restore();
  }

  let _vignetteCanvas = null;
  let _scanlineCanvas = null;
  let _overlayW = 0, _overlayH = 0;

  function _buildOverlayCache() {
    const W = canvas.width, H = canvas.height;
    if (_overlayW === W && _overlayH === H && _vignetteCanvas && _scanlineCanvas) return;
    _overlayW = W;
    _overlayH = H;

    _vignetteCanvas = document.createElement('canvas');
    _vignetteCanvas.width = W;
    _vignetteCanvas.height = H;
    const vc = _vignetteCanvas.getContext('2d');
    const vg = vc.createRadialGradient(W / 2, H / 2, H * 0.22, W / 2, H / 2, Math.max(W, H) * 0.78);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.72)');
    vc.fillStyle = vg;
    vc.fillRect(0, 0, W, H);

    _scanlineCanvas = document.createElement('canvas');
    _scanlineCanvas.width = W;
    _scanlineCanvas.height = H;
    const sc = _scanlineCanvas.getContext('2d');
    sc.globalAlpha = 0.028;
    sc.fillStyle = '#000000';
    for (let y = 0; y < H; y += 4) sc.fillRect(0, y, W, 2);
  }

  function drawVignetteAndScanlines() {
    _buildOverlayCache();
    ctx.drawImage(_vignetteCanvas, 0, 0);
    ctx.drawImage(_scanlineCanvas, 0, 0);

    // last-life red danger vignette
    if (player.lives === 1) {
      const W = canvas.width, H = canvas.height;
      const rg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
      rg.addColorStop(0, 'rgba(180,0,0,0.18)');
      rg.addColorStop(1, 'rgba(180,0,0,0)');
      ctx.save();
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  function drawDarknessOverlay() {
    if (!getActiveMechanics().has('darkness')) return;
    const radius = 180;
    const grad = ctx.createRadialGradient(drone.x, drone.y, radius * 0.45, drone.x, drone.y, radius);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.88)');
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(drone.x, drone.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ─── TITLE SCREEN ────────────────────────────────────────────────────────────
  // ─── TUTORIAL ───────────────────────────────────────────────────────────────
  const tutorial = {
    steps: [
      { text: 'MOVE — WASD',               duration: 3000, spawn: 'slow2' },
      { text: 'SHOOT — HOLD J or MOUSE',   duration: 3500, spawn: 'enemies3' },
      { text: 'DASH — SPACEBAR',           duration: 3000, spawn: 'dashTarget' },
      { text: 'MANAGE HEAT — RELEASE TO COOL', duration: 3500, spawn: 'many' },
      { text: 'HUNT ELITES FOR ALT FIRE',  duration: 3500, spawn: 'elite' },
    ],
    stepIndex: 0,
    stepTimer: 0,
    fadeAlpha: 0,
    active: false,

    start() {
      this.stepIndex = 0;
      this.stepTimer = 0;
      this.fadeAlpha = 0;
      this.active    = true;
      player.lives   = 99;   // invulnerable during tutorial
      player.shield  = true;
      shards.reset();
      bullets.pool = [];
      enemyBullets.reset();
      this._doSpawn();
    },

    _doSpawn() {
      const step = this.steps[this.stepIndex];
      if (!step) return;
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const stats = getStageEnemyStats();
      if (step.spawn === 'slow2') {
        for (let i = 0; i < 2; i++) {
          shards.pool.push(shards._makeShard(
            canvas.width + 40, cy + (i - 0.5) * 120,
            Object.assign({}, stats, { speed: 60, baseHp: 2 }), false
          ));
        }
      } else if (step.spawn === 'enemies3') {
        for (let i = 0; i < 3; i++) {
          shards.pool.push(shards._makeShard(
            canvas.width + 40, cy + (i - 1) * 100,
            Object.assign({}, stats, { speed: 80, baseHp: 2 }), false
          ));
        }
      } else if (step.spawn === 'dashTarget') {
        shards.pool.push(shards._makeShard(
          drone.x + 150, drone.y,
          Object.assign({}, stats, { speed: 0, baseHp: 4 }), false
        ));
      } else if (step.spawn === 'many') {
        for (let i = 0; i < 6; i++) {
          shards.pool.push(shards._makeShard(
            canvas.width + 40 + i * 30, cy + (Math.random() - 0.5) * 300,
            Object.assign({}, stats, { speed: 90, baseHp: 1 }), false
          ));
        }
      } else if (step.spawn === 'elite') {
        shards.pool.push(shards._makeShard(
          canvas.width + 40, cy,
          Object.assign({}, stats, { speed: 70, baseHp: 3 }), true
        ));
      }
    },

    update(delta) {
      if (!this.active) return;
      this.stepTimer += delta;
      const step = this.steps[this.stepIndex];
      if (!step) { this.finish(); return; }

      // fade text in/out
      const t = this.stepTimer / step.duration;
      this.fadeAlpha = t < 0.15 ? t / 0.15
                     : t > 0.85 ? 1 - (t - 0.85) / 0.15
                     : 1;

      if (this.stepTimer >= step.duration) {
        this.stepIndex++;
        this.stepTimer = 0;
        if (this.stepIndex < this.steps.length) this._doSpawn();
      }
    },

    draw() {
      if (!this.active) return;
      const step = this.steps[this.stepIndex];
      if (!step) return;
      ctx.save();
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font         = 'bold 36px monospace';
      ctx.globalAlpha  = this.fadeAlpha * 0.9;
      ctx.fillStyle    = '#ffffff';
      ctx.fillText(step.text, canvas.width / 2, canvas.height * 0.2);
      ctx.restore();
    },

    finish() {
      this.active  = false;
      player.lives = 3;
      player.shield = true;
      player.shieldRechargeTimer = 0;
      shards.reset();
      graze.reset();
      bullets.pool = [];
      pickups.reset();
      fragments.pool = [];
      localStorage.setItem('drone_tutorial_done', '1');
      gameState = 'playing';
      stage.reset();
    }
  };

  function _resetAllState() {
    player.score = 0;
    player.dead = false;
    player.lives = 3;
    player.overdriveCharge = 0;
    player.overdriveActive = false;
    player.overdriveTimer = 0;
    player.heat = 0;

    shards.reset();

  }
function startGame() {
    _resetAllState();

    // first-time tutorial
    if (!localStorage.getItem('drone_tutorial_done')) {
      gameState = 'tutorial';
      tutorial.start();
      return;
    }

    gameState = 'playing';
  }

  function updateTitle(delta) {
    titleGridOff += delta * 0.022;
    const t = getNow() * 0.001;
    drone.x          = 72;
    drone.y          = canvas.height - 82 + Math.sin(t * 0.7) * 8;
    drone.tilt       = Math.sin(t * 0.7) * 0.06;
    drone.rotorAngle += 0.28;

    if (justPressed['ArrowUp'] || justPressed['ArrowDown'] || justPressed['w'] || justPressed['W'] || justPressed['s'] || justPressed['S']) {
      titleSelection = 1 - titleSelection;
      titleSelectionChangedAt = getNow();
    }

    if (justPressed['Enter'] || justPressed[' ']) {
      if (titleSelection === 0) startGame();
