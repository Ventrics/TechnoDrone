<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechnoDrone</title>
  <link rel="stylesheet" href="https://use.typekit.net/bft6law.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    /* gameCanvas is the Canvas 2D render surface — hidden, still captures mouse events */
    #gameCanvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
    }
    /* PixiJS WebGL canvas — visible output, pointer-events pass through to gameCanvas */
    #pixi-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script src="vendor/pixi.min.js"></script>
  <script src="vendor/pixi-filters.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/core.js"></script>
  <script src="js/pixi-post.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ui-endscreens.js"></script>
  <script src="js/player.js"></script>
  <script src="js/stage.js"></script>
  <script src="js/starfield.js"></script>
  <script src="js/wavefield.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/enemy-turrets.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/weapons.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
